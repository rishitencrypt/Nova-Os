<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256">

<defs>
  <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#2B3039"></stop>
    <stop offset="100%" stop-color="#23272F"></stop>
  </linearGradient>

  <linearGradient id="musicMetal" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#A88AF0"></stop>
    <stop offset="100%" stop-color="#8860D8"></stop>
  </linearGradient>
</defs>

<rect x="8" y="8" width="240" height="240" rx="56" fill="url(#bg)" stroke="#444B56" stroke-width="1.5"></rect>

<!-- Beam -->
<rect x="108" y="78" width="52" height="12" rx="6" fill="url(#musicMetal)"></rect>

<!-- Left Stem -->
<rect x="108" y="78" width="12" height="76" rx="6" fill="url(#musicMetal)"></rect>

<!-- Right Stem -->
<rect x="148" y="78" width="12" height="62" rx="6" fill="url(#musicMetal)"></rect>

<!-- Left Note Head -->
<ellipse cx="104" cy="166" rx="20" ry="16" fill="url(#musicMetal)"></ellipse>

<!-- Right Note Head -->
<ellipse cx="144" cy="152" rx="20" ry="16" fill="url(#musicMetal)"></ellipse>

<!-- Metallic definition -->
<ellipse cx="104" cy="166" rx="14" ry="11" fill="#6D49BA" opacity=".22"></ellipse>

<ellipse cx="144" cy="152" rx="14" ry="11" fill="#6D49BA" opacity=".22"></ellipse>

</svg>